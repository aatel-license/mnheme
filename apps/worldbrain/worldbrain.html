<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorldBrain — MNHEME Narrative Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0c0b0a; overflow: hidden; }
  @keyframes pulse { 0%,80%,100%{opacity:.18} 40%{opacity:1} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2e2720; border-radius: 4px; }
  select option { background: #1a1712; color: #ede8df; }
  input::placeholder, textarea::placeholder { color: #4a4438; }
  input:focus, textarea:focus, select:focus { border-color: #5a4d38 !important; }
  button { transition: opacity .15s, border-color .15s, background .15s; }
  button:hover { opacity: .8; }
</style>
</head>
<body>
<div id="root" style="height:100vh"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Cell, ResponsiveContainer } = Recharts;

// ── Constants ────────────────────────────────────────────────────
const FEELINGS = {
  gioia:      { label:'Joy',        color:'#f59e0b' },
  tristezza:  { label:'Sadness',    color:'#6ea8fe' },
  rabbia:     { label:'Rage',       color:'#f87171' },
  paura:      { label:'Fear',       color:'#a78bfa' },
  nostalgia:  { label:'Nostalgia',  color:'#fb923c' },
  amore:      { label:'Love',       color:'#f472b6' },
  malinconia: { label:'Melancholy', color:'#818cf8' },
  serenità:   { label:'Serenity',   color:'#34d399' },
  sorpresa:   { label:'Surprise',   color:'#fcd34d' },
  ansia:      { label:'Anxiety',    color:'#94a3b8' },
  gratitudine:{ label:'Gratitude',  color:'#6ee7b7' },
  vergogna:   { label:'Shame',      color:'#fca5a5' },
  orgoglio:   { label:'Pride',      color:'#c084fc' },
  noia:       { label:'Boredom',    color:'#6b7280' },
  curiosità:  { label:'Curiosity',  color:'#67e8f9' },
};

const C = {
  bg:         '#0c0b0a',
  surface:    '#100f0d',
  elevated:   '#191612',
  border:     '#252018',
  borderHov:  '#3a3228',
  text:       '#ede8df',
  soft:       '#8a8070',
  muted:      '#4e4840',
  accent:     '#c9a96e',
  accentDim:  '#6b5535',
  accentGlow: '#c9a96e22',
};

const uid = () => Math.random().toString(36).slice(2, 10);
const SK = 'mnheme-wb-v2';

const inp = {
  background: C.elevated,
  border: `1px solid ${C.border}`,
  color: C.text,
  padding: '8px 11px',
  borderRadius: 4,
  fontSize: 14,
  fontFamily: "'Crimson Pro', Georgia, serif",
  outline: 'none',
  width: '100%',
};

// ── New Character Modal ──────────────────────────────────────────
function NewCharModal({ onSave, onClose }) {
  const [name, setName] = useState('');
  const [arch, setArch] = useState('');
  return (
    <div onClick={e => e.target===e.currentTarget && onClose()}
      style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.72)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200 }}>
      <div style={{ background:C.elevated, border:`1px solid ${C.borderHov}`, borderRadius:10, padding:28, width:400, maxWidth:'90vw', animation:'fadeIn .2s ease' }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:13, color:C.accent, letterSpacing:'.18em', textTransform:'uppercase', marginBottom:22 }}>
          New Character
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.08em', marginBottom:6 }}>NAME</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Elara Voss"
            style={inp} autoFocus />
        </div>
        <div style={{ marginBottom:22 }}>
          <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.08em', marginBottom:6 }}>ARCHETYPE</label>
          <input value={arch} onChange={e=>setArch(e.target.value)} placeholder="Exiled healer, keeper of lost things"
            style={inp} onKeyDown={e=>e.key==='Enter'&&name.trim()&&onSave(name.trim(),arch.trim())} />
        </div>
        <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
          <button onClick={onClose}
            style={{ padding:'7px 18px', background:'transparent', border:`1px solid ${C.border}`, color:C.soft, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.12em', cursor:'pointer', borderRadius:4 }}>
            Cancel
          </button>
          <button onClick={()=>name.trim()&&onSave(name.trim(),arch.trim())}
            style={{ padding:'7px 18px', background:C.accentDim, border:`1px solid ${C.accent}`, color:C.accent, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.12em', cursor:'pointer', borderRadius:4 }}>
            Create
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Memories Tab ─────────────────────────────────────────────────
function MemoriesTab({ char, memories, onAdd }) {
  const [concept, setConcept] = useState('');
  const [feeling, setFeeling] = useState('nostalgia');
  const [content, setContent] = useState('');
  const [note, setNote] = useState('');

  const submit = () => {
    if (!concept.trim() || !content.trim()) return;
    onAdd({ concept: concept.trim(), feeling, content: content.trim(), note: note.trim() });
    setConcept(''); setContent(''); setNote('');
  };

  const canSubmit = concept.trim() && content.trim();

  return (
    <div style={{ display:'flex', height:'100%', overflow:'hidden' }}>
      {/* Form */}
      <div style={{ width:268, flexShrink:0, borderRight:`1px solid ${C.border}`, padding:'16px 14px', overflowY:'auto', background:C.surface }}>
        <div style={{ fontSize:10, color:C.muted, fontFamily:"'Cinzel',serif", letterSpacing:'.16em', textTransform:'uppercase', marginBottom:16 }}>
          Record a Memory
        </div>

        <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.06em', marginBottom:5 }}>CONCEPT</label>
        <input value={concept} onChange={e=>setConcept(e.target.value)} placeholder="Betrayal, Home, War..."
          style={{...inp, marginBottom:12}} />

        <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.06em', marginBottom:5 }}>FEELING</label>
        <select value={feeling} onChange={e=>setFeeling(e.target.value)}
          style={{...inp, marginBottom:12, color: FEELINGS[feeling]?.color || C.text}}>
          {Object.entries(FEELINGS).map(([k,v]) => (
            <option key={k} value={k}>{v.label} — {k}</option>
          ))}
        </select>

        <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.06em', marginBottom:5 }}>CONTENT</label>
        <textarea value={content} onChange={e=>setContent(e.target.value)} rows={5}
          placeholder={`What ${char.name} lived. What was felt. In their own voice...`}
          style={{...inp, resize:'vertical', lineHeight:1.65, marginBottom:12}} />

        <label style={{ display:'block', fontSize:11, color:C.soft, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.06em', marginBottom:5 }}>
          NOTE <span style={{color:C.muted}}>— optional</span>
        </label>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="World context, location..."
          style={{...inp, marginBottom:18}} />

        <button onClick={submit}
          style={{ width:'100%', padding:'9px', background: canSubmit ? C.accentDim : C.elevated,
            border:`1px solid ${canSubmit ? C.accent : C.border}`, color: canSubmit ? C.accent : C.muted,
            fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.16em', cursor:'pointer', borderRadius:4, textTransform:'uppercase' }}>
          Append to Archive
        </button>
      </div>

      {/* Memory list */}
      <div style={{ flex:1, overflowY:'auto', padding:'18px 20px' }}>
        {memories.length === 0 ? (
          <div style={{ textAlign:'center', paddingTop:70, color:C.muted, fontStyle:'italic', fontSize:14, lineHeight:2.2 }}>
            The archive is empty.<br/>
            <span style={{ fontSize:11, fontFamily:"'JetBrains Mono',monospace", color:C.muted }}>No memories recorded yet for {char.name}.</span>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:10, maxWidth:660 }}>
            {memories.map((m, i) => (
              <div key={m.id}
                style={{ background:C.elevated, border:`1px solid ${C.border}`, borderRadius:7, padding:'13px 16px',
                  borderLeft:`3px solid ${FEELINGS[m.feeling]?.color || C.accent}`, animation: i===0 ? 'fadeIn .25s ease' : 'none' }}>
                <div style={{ display:'flex', alignItems:'baseline', gap:9, marginBottom:8, flexWrap:'wrap' }}>
                  <span style={{ fontFamily:"'Cinzel',serif", fontSize:13, color:C.text, fontWeight:600 }}>{m.concept}</span>
                  <span style={{ fontSize:10, padding:'2px 8px', borderRadius:10, background: (FEELINGS[m.feeling]?.color||C.accent)+'1a', color: FEELINGS[m.feeling]?.color||C.accent, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.05em' }}>
                    {FEELINGS[m.feeling]?.label||m.feeling}
                  </span>
                  <span style={{ marginLeft:'auto', fontSize:10, color:C.muted, fontFamily:"'JetBrains Mono',monospace" }}>
                    {new Date(m.timestamp).toLocaleDateString('en-GB')}
                  </span>
                </div>
                <p style={{ margin:0, fontSize:14.5, color: '#d8d0c4', lineHeight:1.68, fontStyle:'italic' }}>"{m.content}"</p>
                {m.note && <p style={{ margin:'7px 0 0', fontSize:12, color:C.soft, fontStyle:'normal' }}>{m.note}</p>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── LM Studio Config Banner ───────────────────────────────────────
function LMStudioBanner({ url, model, onSave }) {
  const [u, setU] = useState(url);
  const [m, setM] = useState(model);
  const [saved, setSaved] = useState(false);
  const save = () => { onSave(u.trim(), m.trim()); setSaved(true); setTimeout(()=>setSaved(false), 2000); };
  return (
    <div style={{ padding:'7px 14px', background:'#0d1a12', borderBottom:`1px solid #1a3a22`,
      display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
      <span style={{ fontSize:9, color:'#4a8a5a', fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.1em', flexShrink:0 }}>
        LM STUDIO
      </span>
      <input value={u} onChange={e=>setU(e.target.value)}
        style={{ width:260, background:'#0a100c', border:'1px solid #1a3a22', color:'#7ac48a', padding:'3px 9px',
          borderRadius:3, fontSize:11, fontFamily:"'JetBrains Mono',monospace", outline:'none' }} />
      <input value={m} onChange={e=>setM(e.target.value)} placeholder="model name (e.g. mistral-7b)"
        style={{ flex:1, minWidth:140, background:'#0a100c', border:'1px solid #1a3a22', color:'#7ac48a', padding:'3px 9px',
          borderRadius:3, fontSize:11, fontFamily:"'JetBrains Mono',monospace", outline:'none' }} />
      <button onClick={save}
        style={{ padding:'3px 12px', background:'#1a3a22', border:'1px solid #4a8a5a', color:'#7ac48a',
          fontFamily:"'Cinzel',serif", fontSize:9, letterSpacing:'.12em', cursor:'pointer', borderRadius:3, flexShrink:0 }}>
        {saved ? '✓ saved' : 'Save'}
      </button>
    </div>
  );
}

// ── Brain Tab ────────────────────────────────────────────────────
function BrainTab({ char, memories, chat, onSaveChat, lmUrl, lmModel }) {
  const [msgs, setMsgs] = useState(chat);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { setMsgs(chat); }, [char.id]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs, loading]);

  const send = async () => {
    if (!input.trim() || loading) return;
    setError('');
    const userMsg = { role:'user', content: input.trim() };
    const next = [...msgs, userMsg];
    setMsgs(next); setInput(''); setLoading(true);

    const memBlock = memories.length === 0
      ? '[Archive is empty — no memories recorded yet]'
      : memories.slice(0, 30).map(m =>
          `[${new Date(m.timestamp).toLocaleDateString('en-GB')}] CONCEPT: ${m.concept} | FEELING: ${FEELINGS[m.feeling]?.label||m.feeling}\n"${m.content}"${m.note ? '\n[note: '+m.note+']' : ''}`
        ).join('\n\n');

    const systemPrompt = `You are the psychological Brain of ${char.name} — ${char.archetype || 'a narrative character'}.

You have access to this character's MNHEME: an append-only emotional memory archive. Each entry records a concept, a feeling, and the lived experience in their own voice.

═══ EMOTIONAL MEMORY ARCHIVE ═══
${memBlock}
════════════════════════════════

Respond to questions about ${char.name} from deep inside their emotional history.
— Stay faithful to the arc revealed by these memories
— Speak with psychological depth and narrative richness
— Never invent experiences not present in the archive
— You may reflect, interpret, and connect memories — but never fabricate them
— If the archive is sparse, acknowledge the gaps honestly`;

    // LM Studio uses the OpenAI-compatible /v1/chat/completions endpoint
    // system message is injected as the first message with role "system"
    const messages = [
      { role: 'system', content: systemPrompt },
      ...next.map(m => ({ role: m.role, content: m.content }))
    ];

    try {
      const res = await fetch(lmUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: lmModel || 'local-model',
          max_tokens: 1000,
          temperature: 0.7,
          messages
        })
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}: ${txt.slice(0,120)}`);
      }
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '[Empty response from LM Studio]';
      const done = [...next, { role:'assistant', content: reply }];
      setMsgs(done); onSaveChat(done);
    } catch(e) {
      setError(e.message || 'Connection failed');
      const done = [...next, { role:'assistant', content: `[Brain unreachable — ${e.message}]` }];
      setMsgs(done); onSaveChat(done);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  };

  const clearChat = () => { setMsgs([]); onSaveChat([]); };

  const suggestions = [
    `What is ${char.name}'s emotional arc around their dominant concept?`,
    `How does ${char.name} relate to power and control?`,
    `What hidden fear shapes ${char.name}'s decisions?`,
    `Describe ${char.name}'s psychological portrait in three sentences.`,
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* Context bar */}
      <div style={{ padding:'7px 20px', borderBottom:`1px solid ${C.border}`, background:C.surface, display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
        <span style={{ fontSize:10, color:C.muted, fontFamily:"'JetBrains Mono',monospace" }}>
          Brain · {char.name} · {memories.length} memories in context
        </span>
        {error && <span style={{ fontSize:10, color:'#f87171', fontFamily:"'JetBrains Mono',monospace", flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>⚠ {error}</span>}
        {msgs.length > 0 && (
          <button onClick={clearChat}
            style={{ background:'transparent', border:'none', color:C.muted, fontSize:10, fontFamily:"'JetBrains Mono',monospace", cursor:'pointer', letterSpacing:'.06em', flexShrink:0 }}>
            clear chat
          </button>
        )}
      </div>

      {/* Messages */}
      <div style={{ flex:1, overflowY:'auto', padding:'20px 22px' }}>
        {msgs.length === 0 && (
          <div style={{ paddingTop:30 }}>
            <div style={{ textAlign:'center', marginBottom:28 }}>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:13, color:C.accentDim, letterSpacing:'.16em', marginBottom:8 }}>
                The Brain of {char.name} awaits
              </div>
              <div style={{ fontSize:13.5, fontStyle:'italic', color:C.soft, lineHeight:1.8 }}>
                Ask about their emotional history,<br/>
                a concept, a relationship, the arc of their inner life.
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:7, maxWidth:500, margin:'0 auto' }}>
              {suggestions.map((s, i) => (
                <button key={i} onClick={()=>{ setInput(s); inputRef.current?.focus(); }}
                  style={{ background:C.elevated, border:`1px solid ${C.border}`, color:C.soft, padding:'9px 14px', borderRadius:5,
                    fontSize:13, fontFamily:"'Crimson Pro',serif", fontStyle:'italic', cursor:'pointer', textAlign:'left', lineHeight:1.5 }}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        {msgs.map((m, i) => (
          <div key={i} style={{ marginBottom:14, display:'flex', justifyContent: m.role==='user' ? 'flex-end' : 'flex-start', animation:'fadeIn .2s ease' }}>
            {m.role === 'assistant' && (
              <div style={{ width:26, height:26, borderRadius:'50%', background:C.accentDim, border:`1px solid ${C.accentDim}`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Cinzel',serif", fontSize:9, color:C.accent, flexShrink:0, marginRight:9, marginTop:2, letterSpacing:'.1em' }}>
                B
              </div>
            )}
            <div style={{ maxWidth:'74%', background: m.role==='user' ? C.accentDim+'88' : C.elevated,
              border:`1px solid ${m.role==='user' ? C.accentDim : C.border}`,
              borderRadius: m.role==='user' ? '12px 12px 4px 12px' : '12px 12px 12px 4px',
              padding:'10px 14px', fontSize:14.5, lineHeight:1.72, color: m.role==='user' ? '#ede8df' : '#cfc8bc',
              fontStyle: m.role==='assistant' ? 'italic' : 'normal' }}>
              {m.content}
            </div>
          </div>
        ))}

        {loading && (
          <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:14, animation:'fadeIn .2s ease' }}>
            <div style={{ width:26, height:26, borderRadius:'50%', background:C.accentDim, border:`1px solid ${C.accentDim}`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Cinzel',serif", fontSize:9, color:C.accent, flexShrink:0, letterSpacing:'.1em' }}>B</div>
            <div style={{ background:C.elevated, border:`1px solid ${C.border}`, borderRadius:'12px 12px 12px 4px', padding:'11px 16px' }}>
              <div style={{ display:'flex', gap:5, alignItems:'center' }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{ width:5, height:5, borderRadius:'50%', background:C.accent, animation:`pulse 1.2s ${i*.22}s ease-in-out infinite` }} />
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div style={{ padding:'11px 20px', borderTop:`1px solid ${C.border}`, background:C.surface, display:'flex', gap:9 }}>
        <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
          placeholder={`Ask the Brain about ${char.name}...`}
          style={{ flex:1, background:C.elevated, border:`1px solid ${C.border}`, color:C.text, padding:'9px 14px', borderRadius:6, fontSize:14.5, fontFamily:"'Crimson Pro',serif", outline:'none' }} />
        <button onClick={send} disabled={!input.trim()||loading}
          style={{ padding:'9px 20px', background: input.trim()&&!loading ? C.accentDim : C.elevated,
            border:`1px solid ${input.trim()&&!loading ? C.accent : C.border}`,
            color: input.trim()&&!loading ? C.accent : C.muted,
            fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.14em', cursor:'pointer', borderRadius:6, textTransform:'uppercase', flexShrink:0 }}>
          Ask
        </button>
      </div>
    </div>
  );
}

// ── Analytics Tab ─────────────────────────────────────────────────
function AnalyticsTab({ memories }) {
  const feelDist = Object.entries(FEELINGS)
    .map(([k,v]) => ({ name:v.label, count:memories.filter(m=>m.feeling===k).length, color:v.color, key:k }))
    .filter(d=>d.count>0)
    .sort((a,b)=>b.count-a.count);

  const conceptMap = {};
  memories.forEach(m => {
    if(!conceptMap[m.concept]) conceptMap[m.concept] = { total:0, feelings:{} };
    conceptMap[m.concept].total++;
    conceptMap[m.concept].feelings[m.feeling] = (conceptMap[m.concept].feelings[m.feeling]||0)+1;
  });
  const concepts = Object.entries(conceptMap).sort((a,b)=>b[1].total-a[1].total);

  if (memories.length === 0) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:C.muted, fontStyle:'italic', fontSize:14 }}>
      No memories to analyse yet.
    </div>
  );

  return (
    <div style={{ overflowY:'auto', height:'100%', padding:'20px 22px' }}>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16, maxWidth:860 }}>
        {/* Feeling distribution */}
        <div style={{ background:C.elevated, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
          <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.accent, letterSpacing:'.16em', textTransform:'uppercase', marginBottom:14 }}>
            Emotional Distribution
          </div>
          <div style={{ height:200 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={feelDist} margin={{ top:0, right:4, bottom:28, left:-20 }}>
                <XAxis dataKey="name" tick={{ fill:C.soft, fontSize:9, fontFamily:"'JetBrains Mono',monospace" }}
                  angle={-38} textAnchor="end" interval={0} />
                <YAxis tick={{ fill:C.muted, fontSize:9, fontFamily:"'JetBrains Mono',monospace" }} allowDecimals={false} />
                <Tooltip
                  contentStyle={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, color:C.text, fontFamily:"'Crimson Pro',serif", fontSize:13 }}
                  cursor={{ fill:'rgba(255,255,255,.03)' }} />
                <Bar dataKey="count" radius={[3,3,0,0]}>
                  {feelDist.map((d,i) => <Cell key={i} fill={d.color} opacity={.72} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Concept map */}
        <div style={{ background:C.elevated, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
          <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.accent, letterSpacing:'.16em', textTransform:'uppercase', marginBottom:14 }}>
            Concept Map
          </div>
          <div style={{ maxHeight:230, overflowY:'auto', display:'flex', flexDirection:'column', gap:9 }}>
            {concepts.map(([concept, data]) => {
              const dominant = Object.entries(data.feelings).sort((a,b)=>b[1]-a[1])[0];
              const domColor = FEELINGS[dominant[0]]?.color || C.accent;
              return (
                <div key={concept} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ width:7, height:7, borderRadius:'50%', background:domColor, flexShrink:0 }} />
                  <span style={{ fontFamily:"'Cinzel',serif", fontSize:12, color:C.text, flex:1 }}>{concept}</span>
                  <span style={{ fontSize:10, padding:'2px 7px', borderRadius:8, background:domColor+'1a', color:domColor, fontFamily:"'JetBrains Mono',monospace" }}>
                    {FEELINGS[dominant[0]]?.label||dominant[0]}
                  </span>
                  <span style={{ fontSize:10, color:C.muted, fontFamily:"'JetBrains Mono',monospace", minWidth:16, textAlign:'right' }}>{data.total}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Timeline */}
      <div style={{ background:C.elevated, border:`1px solid ${C.border}`, borderRadius:8, padding:18, maxWidth:860 }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:10, color:C.accent, letterSpacing:'.16em', textTransform:'uppercase', marginBottom:16 }}>
          Memory Timeline — {memories.length} entries
        </div>
        <div style={{ display:'flex', flexDirection:'column' }}>
          {[...memories].map((m, i) => {
            const color = FEELINGS[m.feeling]?.color || C.accent;
            return (
              <div key={m.id} style={{ display:'flex', gap:14 }}>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:18, flexShrink:0 }}>
                  <div style={{ width:9, height:9, borderRadius:'50%', background:color, flexShrink:0, marginTop:4, boxShadow:`0 0 6px ${color}66` }} />
                  {i < memories.length-1 && <div style={{ width:1, flex:1, background:C.border, minHeight:6 }} />}
                </div>
                <div style={{ paddingBottom:14, flex:1 }}>
                  <div style={{ display:'flex', gap:8, alignItems:'baseline', marginBottom:3, flexWrap:'wrap' }}>
                    <span style={{ fontFamily:"'Cinzel',serif", fontSize:12, color:C.text }}>{m.concept}</span>
                    <span style={{ fontSize:10, color, fontFamily:"'JetBrains Mono',monospace" }}>{FEELINGS[m.feeling]?.label||m.feeling}</span>
                    <span style={{ fontSize:10, color:C.muted, fontFamily:"'JetBrains Mono',monospace" }}>{new Date(m.timestamp).toLocaleDateString('en-GB')}</span>
                  </div>
                  <p style={{ margin:0, fontSize:13, color:C.soft, fontStyle:'italic', lineHeight:1.55 }}>
                    "{m.content.length > 130 ? m.content.slice(0,130)+'…' : m.content}"
                  </p>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Empty State ──────────────────────────────────────────────────
function EmptyState({ onNewChar }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', textAlign:'center', padding:40 }}>
      <div style={{ fontFamily:"'Cinzel',serif", fontSize:32, color:C.accentDim, letterSpacing:'.22em', marginBottom:14, fontWeight:600 }}>WORLDBRAIN</div>
      <div style={{ fontSize:13.5, fontStyle:'italic', lineHeight:1.9, marginBottom:10, maxWidth:400, color:C.soft }}>
        "Memory does not overwrite. It stratifies."
      </div>
      <div style={{ fontSize:11, color:C.muted, fontFamily:"'JetBrains Mono',monospace", marginBottom:36, letterSpacing:'.06em' }}>
        MNHEME · emotional memory engine for narrative worlds
      </div>
      <button onClick={onNewChar}
        style={{ padding:'10px 28px', background:'transparent', border:`1px solid ${C.accentDim}`, color:C.accent, fontFamily:"'Cinzel',serif", fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', cursor:'pointer', borderRadius:4 }}>
        Create your first character
      </button>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────
function Sidebar({ characters, sel, onSel, onNew }) {
  return (
    <div style={{ width:210, flexShrink:0, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', background:C.surface }}>
      <div style={{ padding:'18px 14px 12px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontFamily:"'Cinzel',serif", fontSize:13, letterSpacing:'.2em', color:C.accent, fontWeight:600 }}>WORLDBRAIN</div>
        <div style={{ fontSize:9, color:C.muted, marginTop:3, fontFamily:"'JetBrains Mono',monospace", letterSpacing:'.07em' }}>MNHEME · NARRATIVE ENGINE</div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'6px 0' }}>
        {characters.length === 0 && (
          <div style={{ padding:'22px 14px', color:C.muted, fontSize:13, fontStyle:'italic', lineHeight:1.8 }}>
            No characters yet.<br/>Begin your world.
          </div>
        )}
        {characters.map(c => {
          const isSel = sel === c.id;
          return (
            <button key={c.id} onClick={()=>onSel(c.id)}
              style={{ width:'100%', textAlign:'left', background: isSel ? C.elevated : 'transparent', border:'none',
                padding:'9px 14px', cursor:'pointer', borderLeft: isSel ? `2px solid ${C.accent}` : '2px solid transparent', transition:'all .15s' }}>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:12, color: isSel ? C.accent : C.text, fontWeight: isSel ? 600 : 400 }}>{c.name}</div>
              <div style={{ fontSize:10, color:C.muted, marginTop:2, fontFamily:"'JetBrains Mono',monospace", whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                {c.archetype || '—'}
              </div>
            </button>
          );
        })}
      </div>

      <div style={{ padding:'10px 14px', borderTop:`1px solid ${C.border}` }}>
        <button onClick={onNew}
          style={{ width:'100%', padding:'7px', background:'transparent', border:`1px solid ${C.border}`,
            color:C.accent, fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.16em', cursor:'pointer', textTransform:'uppercase', borderRadius:3 }}>
          + New Character
        </button>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState({ characters:[], memories:{}, chats:{} });
  const [sel, setSel] = useState(null);
  const [tab, setTab] = useState('memories');
  const [loaded, setLoaded] = useState(false);
  const [showNew, setShowNew] = useState(false);
  const [lmUrl, setLmUrl]   = useState(() => localStorage.getItem('mnheme-lm-url')   || 'http://localhost:1234/v1/chat/completions');
  const [lmModel, setLmModel] = useState(() => localStorage.getItem('mnheme-lm-model') || '');

  const saveLmConfig = (u, m) => {
    setLmUrl(u); setLmModel(m);
    localStorage.setItem('mnheme-lm-url', u);
    localStorage.setItem('mnheme-lm-model', m);
  };

  useEffect(() => {
    try {
      const saved = localStorage.getItem(SK);
      if (saved) setData(JSON.parse(saved));
    } catch(e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(SK, JSON.stringify(data)); } catch(e) {}
  }, [data, loaded]);

  const addChar = (name, arch) => {
    const c = { id:uid(), name, archetype:arch, createdAt:Date.now() };
    setData(d => ({...d, characters:[...d.characters, c]}));
    setSel(c.id); setTab('memories'); setShowNew(false);
  };

  const addMem = useCallback((cid, mem) => {
    setData(d => ({...d, memories:{...d.memories, [cid]:[
      { ...mem, id:uid(), timestamp:Date.now() },
      ...(d.memories[cid]||[])
    ]}}));
  }, []);

  const saveChat = useCallback((cid, msgs) => {
    setData(d => ({...d, chats:{...d.chats, [cid]:msgs}}));
  }, []);

  const handleSel = id => { setSel(id); setTab('memories'); };

  const char = data.characters.find(c=>c.id===sel);
  const mems = sel ? (data.memories[sel]||[]) : [];
  const chatHist = sel ? (data.chats[sel]||[]) : [];

  if (!loaded) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:C.bg, color:C.muted, fontFamily:"'Cinzel',serif", letterSpacing:'.2em', fontSize:12 }}>
      LOADING...
    </div>
  );

  return (
    <div style={{ display:'flex', height:'100vh', background:C.bg, color:C.text, fontFamily:"'Crimson Pro',Georgia,serif", overflow:'hidden' }}>

      <Sidebar characters={data.characters} sel={sel} onSel={handleSel} onNew={()=>setShowNew(true)} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <LMStudioBanner url={lmUrl} model={lmModel} onSave={saveLmConfig} />
        {char ? (
          <>
            {/* Header */}
            <div style={{ padding:'13px 22px', borderBottom:`1px solid ${C.border}`, background:C.surface, display:'flex', alignItems:'baseline', gap:12, flexWrap:'wrap' }}>
              <span style={{ fontFamily:"'Cinzel',serif", fontSize:16, fontWeight:600, color:C.accent }}>{char.name}</span>
              {char.archetype && (
                <span style={{ fontSize:11, color:C.muted, fontFamily:"'JetBrains Mono',monospace", background:C.elevated, padding:'2px 9px', borderRadius:3 }}>
                  {char.archetype}
                </span>
              )}
              <span style={{ marginLeft:'auto', fontSize:10, color:C.muted, fontFamily:"'JetBrains Mono',monospace" }}>
                {mems.length} {mems.length === 1 ? 'memory' : 'memories'}
              </span>
            </div>

            {/* Tabs */}
            <div style={{ display:'flex', borderBottom:`1px solid ${C.border}`, background:C.surface }}>
              {[
                { id:'memories', label:'Memories' },
                { id:'brain', label:'Brain' },
                { id:'analytics', label:'Analytics' },
              ].map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)}
                  style={{ padding:'9px 20px', background:'transparent', border:'none', cursor:'pointer',
                    fontFamily:"'Cinzel',serif", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase',
                    color: tab===t.id ? C.accent : C.muted,
                    borderBottom: tab===t.id ? `1px solid ${C.accent}` : '1px solid transparent',
                    transition:'all .15s' }}>
                  {t.label}
                  {t.id === 'memories' && mems.length > 0 && (
                    <span style={{ marginLeft:6, fontSize:9, background:C.accentDim, color:C.accent, padding:'1px 5px', borderRadius:8, fontFamily:"'JetBrains Mono',monospace" }}>
                      {mems.length}
                    </span>
                  )}
                </button>
              ))}
            </div>

            {/* Content */}
            <div style={{ flex:1, overflow:'hidden' }}>
              {tab==='memories' && <MemoriesTab char={char} memories={mems} onAdd={m=>addMem(char.id,m)} />}
              {tab==='brain'    && <BrainTab char={char} memories={mems} chat={chatHist} onSaveChat={msgs=>saveChat(char.id,msgs)} lmUrl={lmUrl} lmModel={lmModel} />}
              {tab==='analytics'&& <AnalyticsTab memories={mems} />}
            </div>
          </>
        ) : (
          <EmptyState onNewChar={()=>setShowNew(true)} />
        )}
      </div>

      {showNew && <NewCharModal onSave={addChar} onClose={()=>setShowNew(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
